version: '3.8'

services:
 
  db:
    image: postgres:15-alpine
    container_name: resource_booking_postgres
    restart: always
    
   
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Lozinka6 
      POSTGRES_DB: resource_booking
      
   
    ports:
      - "5432:5432"
     
    volumes:
      - postgres_data:/var/lib/postgresql/data 
      - ./init-scripts:/docker-entrypoint-initdb.d 

volumes:
  postgres_data: